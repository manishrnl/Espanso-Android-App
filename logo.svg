<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="512" height="512" fill="#ffffff"/>
  
  <!-- Purple circular background with gradient -->
  <defs>
    <radialGradient id="purpleGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#6b5fb3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3fa0;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main circle with shadow -->
  <circle cx="256" cy="256" r="240" fill="url(#purpleGradient)" filter="url(#shadow)"/>
  
  <!-- Text: RNL -->
  <text x="256" y="300" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">RNL</text>
</svg>